services:
  frontend:
    build: frontend/.
    ports:
      - "8888:80"
    volumes:
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf:ro,z
    restart: always
  backend:
    build: backend/.
    restart: always
  mcp_server:
    build: mcp_server/.
    ports:
      - "9000:9000"
    restart: always
